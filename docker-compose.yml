version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    volumes:
      - ./apps/web:/app/apps/web
      - /app/node_modules
    command: npm run dev -w @repo/web

  docs:
    build:
      context: .
      dockerfile: ./apps/docs/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
    volumes:
      - ./apps/docs:/app/apps/docs
      - /app/node_modules
    command: npm run dev -w @repo/docs
